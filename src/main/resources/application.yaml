spring:
  servlet:
    multipart:
      max-file-size: 128MB
      max-request-size: 128MB
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: SermonArchive
  profiles:
    default: local
    active: "${LOGGING_PROFILE}"
  datasource:
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: public
        format_sql: false
    show-sql: false
jwt:
  secret: "${JWT_SECRET}"
  expiration: 3600000
s3:
  endpoint: "${S3_ENDPOINT}"
  access-key: "${S3_ACCESS_KEY}"
  secret-key: "${S3_SECRET_KEY}"
  bucket-name: "${S3_BUCKET_NAME}"
  region: "${S3_REGION}"