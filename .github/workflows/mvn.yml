name: Java CI with Maven

on:
  push:
    branches: [ "main", "task/add-unit-tests" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        env:
          DB_URL: jdbc:h2:mem:sermondb
          DB_USERNAME: sa
          DB_PASSWORD: ""
          LOGGING_PROFILE: local
          JWT_SECRET: dummy_secret_key_must_be_long_enough_for_jwt_validation_step
          -DS3_ENDPOINT: http://localhost:9000
          -DS3_ACCESS_KEY: dummy-access
          -DS3_SECRET_KEY: dummy-secret
          -DS3_BUCKET_NAME: dummy-bucket
          -DS3_REGION: us-east-1
        run: mvn -B clean test